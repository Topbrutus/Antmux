name: Fix LinuxIA short stutter

on:
  push:
    branches:
      - linuxia-cli-scroll-integration
    paths:
      - '.github/workflows/fix-linuxia-short-stutter.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: linuxia-cli-scroll-integration
          fetch-depth: 0

      - name: Patch short adjacent stutters
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import unicodedata
          from pathlib import Path

          root = Path('tools/linuxia')
          path = root / 'shell/conversation.py'
          text = path.read_text(encoding='utf-8')

          old_function = '''def _remove_adjacent_word_stutter(value: str) -> str:
              """Retire les faux départs adjacents du type « anal analyser »."""
              pattern = re.compile(
                  r"(?iu)(?=\\b([^\\W\\d_]{4,})\\s+([^\\W\\d_]{4,})\\b)"
              )
              current = value
              while True:
                  replacement = None
                  for match in pattern.finditer(current):
                      first, second = match.group(1), match.group(2)
                      left, right = first.casefold(), second.casefold()
                      if left == right or (len(right) > len(left) and right.startswith(left)):
                          replacement = (match.start(1), match.end(2), second)
                          break
                  if replacement is None:
                      return current
                  start, end, second = replacement
                  current = current[:start] + second + current[end:]
          '''

          new_function = '''def _remove_adjacent_word_stutter(value: str) -> str:
              """Retire les répétitions exactes et les faux départs adjacents."""
              exact_duplicate = re.compile(r"(?iu)\\b([^\\W\\d_]{2,})\\s+\\1\\b")
              prefix_pair = re.compile(
                  r"(?iu)(?=\\b([^\\W\\d_]{4,})\\s+([^\\W\\d_]{4,})\\b)"
              )
              current = value
              while True:
                  collapsed = exact_duplicate.sub(r"\\1", current)
                  if collapsed != current:
                      current = collapsed
                      continue

                  replacement = None
                  for match in prefix_pair.finditer(current):
                      first, second = match.group(1), match.group(2)
                      left, right = first.casefold(), second.casefold()
                      if left != right and len(right) > len(left) and right.startswith(left):
                          replacement = (match.start(1), match.end(2), second)
                          break
                  if replacement is None:
                      return current
                  start, end, second = replacement
                  current = current[:start] + second + current[end:]
          '''

          if old_function not in text:
              raise SystemExit('expected stutter function was not found')
          text = text.replace(old_function, new_function, 1)

          old_test = '''        "sanitize_prefix_stutter": sanitize_response(
                      "Je n’ai pas de fonction ni d’études person personnelles.", "court"
                  )
                  == "Je n’ai pas de fonction ni d’études personnelles.",
          '''
          new_test = old_test + '''        "sanitize_short_duplicate_stutter": sanitize_response(
                      "Je Je ne peux pas agir.", "court"
                  )
                  == "Je ne peux pas agir.",
                  "preview_short_duplicate_stutter": sanitize_preview_response(
                      "Je Je ne peux pas agir."
                  )
                  == "Je ne peux pas agir.",
          '''
          if old_test not in text:
              raise SystemExit('expected stutter self-test block was not found')
          text = text.replace(old_test, new_test, 1)
          path.write_text(text, encoding='utf-8', newline='\n')

          entries = []
          for file_path in sorted(root.rglob('*')):
              if not file_path.is_file() or file_path.name == 'checksums.sha256':
                  continue
              relative = file_path.relative_to(root).as_posix()
              raw = file_path.read_bytes()
              normalized = unicodedata.normalize(
                  'NFC', raw.decode('utf-8-sig').replace('\r\n', '\n').replace('\r', '\n')
              )
              digest = hashlib.sha256(normalized.encode('utf-8')).hexdigest()
              entries.append(f'{digest}  {relative}')
          (root / 'checksums.sha256').write_text('\n'.join(entries) + '\n', encoding='utf-8', newline='\n')
          PY

      - name: Validate shell self-test and checksums
        shell: bash
        run: |
          set -euo pipefail
          python3 -B tools/linuxia/shell/linuxia_ant_console.py self-test
          python3 - <<'PY'
          import hashlib
          import unicodedata
          from pathlib import Path

          root = Path('tools/linuxia')
          expected = {}
          for line in (root / 'checksums.sha256').read_text(encoding='utf-8').splitlines():
              if line.strip():
                  digest, rel = line.split('  ', 1)
                  expected[rel] = digest
          actual = sorted(
              p.relative_to(root).as_posix()
              for p in root.rglob('*')
              if p.is_file() and p.name != 'checksums.sha256'
          )
          assert actual == sorted(expected)
          for rel, wanted in expected.items():
              raw = (root / rel).read_bytes()
              normalized = unicodedata.normalize(
                  'NFC', raw.decode('utf-8-sig').replace('\r\n', '\n').replace('\r', '\n')
              )
              assert hashlib.sha256(normalized.encode('utf-8')).hexdigest() == wanted, rel
          PY

      - name: Commit fix and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/workflows/fix-linuxia-short-stutter.yml
          git add -A
          git commit -m 'fix(shell): collapse short adjacent stutters'
          git push origin HEAD:linuxia-cli-scroll-integration
