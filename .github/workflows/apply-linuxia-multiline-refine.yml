name: Diagnose LinuxIA multiline input refinements

on:
  push:
    branches:
      - linuxia-cli-scroll-integration
    paths:
      - '.integration/linuxia-multiline-refine/patch.py'
      - '.github/workflows/apply-linuxia-multiline-refine.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: linuxia-cli-scroll-integration
          fetch-depth: 0

      - name: Run patch and record diagnostics
        shell: bash
        run: |
          set +e
          result='.integration/linuxia-multiline-refine/result.txt'
          : > "$result"
          python3 .integration/linuxia-multiline-refine/patch.py >> "$result" 2>&1
          patch_status=$?
          echo "PATCH_STATUS=$patch_status" >> "$result"
          if [ "$patch_status" -eq 0 ]; then
            python3 -B tools/linuxia/shell/linuxia_ant_console.py self-test >> "$result" 2>&1
            echo "SELFTEST_STATUS=$?" >> "$result"
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$result"
          git commit -m 'chore(shell): record multiline refinement diagnostics'
          git push origin HEAD:linuxia-cli-scroll-integration
