name: Apply LinuxIA multiline input

on:
  push:
    branches:
      - linuxia-cli-scroll-integration
    paths:
      - '.integration/linuxia-multiline-input/**'
      - '.github/workflows/apply-linuxia-multiline-input.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: linuxia-cli-scroll-integration
          fetch-depth: 0

      - name: Apply multiline input patch
        run: python3 .integration/linuxia-multiline-input/patch.py

      - name: Validate Python shell self-test
        run: python3 -B tools/linuxia/shell/linuxia_ant_console.py self-test

      - name: Validate checksum registry
        run: |
          python3 - <<'PY'
          import hashlib
          import unicodedata
          from pathlib import Path

          root = Path('tools/linuxia')
          expected = {}
          for line in (root / 'checksums.sha256').read_text(encoding='utf-8').splitlines():
              if line.strip():
                  digest, rel = line.split('  ', 1)
                  expected[rel] = digest

          actual = sorted(
              p.relative_to(root).as_posix()
              for p in root.rglob('*')
              if p.is_file() and p.name != 'checksums.sha256'
          )
          assert actual == sorted(expected), 'checksum registry file list mismatch'

          for rel, wanted in expected.items():
              raw = (root / rel).read_bytes()
              text = raw.decode('utf-8-sig')
              canonical = unicodedata.normalize(
                  'NFC', text.replace('\r\n', '\n').replace('\r', '\n')
              )
              got = hashlib.sha256(canonical.encode('utf-8')).hexdigest()
              assert got == wanted, f'checksum mismatch: {rel}'
          PY

      - name: Commit implementation and remove staging files
        run: |
          set -euo pipefail
          rm -rf .integration/linuxia-multiline-input
          rm -f .github/workflows/apply-linuxia-multiline-input.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(shell): expand pasted input across multiple lines'
          git push origin HEAD:linuxia-cli-scroll-integration
